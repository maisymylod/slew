name: Enhancement / task
description: A feature, hardening, test, or docs improvement
title: "[enhancement] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Type
      options:
        - enhancement
        - hardening
        - test
        - documentation
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What should change, and where (file / function / module)?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
