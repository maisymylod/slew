name: Bug report
description: Something is incorrect or broken
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What is wrong, and where (file / function / endpoint)?
      placeholder: e.g. src/foo/bar.py:42, fetch() returns a partial result on timeout
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction / impact
      description: Steps to reproduce, or the conditions under which it bites.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete, checkable conditions for "done".
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
